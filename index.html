        return;
      }
      const { repo: targetRepo, path: filePath } = resolved;
      // NFC正規化（macOSのNFD形式 → GitHubのNFC形式に統一）
      const nfcPath = filePath.normalize('NFC');

      const btn = document.getElementById('btn-pull');
      btn.disabled = true;
      btn.textContent = 'Pull 中...';

      try {
        // 1. GitHub からファイル内容を取得
        const ghRes = await fetch(
          'https://api.github.com/repos/' + targetRepo + '/contents/' + nfcPath + '?ref=' + state.githubBranch,
          { headers: { Authorization: 'token ' + state.githubToken, Accept: 'application/vnd.github.v3+json' } }
        );
        if (!ghRes.ok) {
          if (ghRes.status === 404) throw new Error('GitHub にこのファイルが存在しません');
          throw new Error('GitHub からの取得失敗: ' + ghRes.status);
        }
        const ghData = await ghRes.json();

        // 2. GitHub のコミット日時を取得（最終更新）
        let ghLastModified = null;
        try {
          const commitsRes = await fetch(
            'https://api.github.com/repos/' + targetRepo + '/commits?path=' + encodeURIComponent(nfcPath) + '&sha=' + state.githubBranch + '&per_page=1',
            { headers: { Authorization: 'token ' + state.githubToken, Accept: 'application/vnd.github.v3+json' } }
          );
          if (commitsRes.ok) {
            const commits = await commitsRes.json();
            if (commits.length > 0) {
              ghLastModified = new Date(commits[0].commit.committer.date);
            }
          }
        } catch (e) { /* 日時取得失敗は無視して続行 */ }

        // 3. Drive のファイル更新日時を取得
        let driveLastModified = null;
        try {
          const driveMetaRes = await fetch(
            'https://www.googleapis.com/drive/v3/files/' + state.currentFile.id + '?fields=modifiedTime',
            { headers: { Authorization: 'Bearer ' + state.gdriveToken } }
          );
          if (driveMetaRes.ok) {
            const driveMeta = await driveMetaRes.json();
            driveLastModified = new Date(driveMeta.modifiedTime);
          }
        } catch (e) { /* 日時取得失敗は無視 */ }

        // 4. 日時比較（Drive の方が新しければ確認）
        if (ghLastModified && driveLastModified && driveLastModified > ghLastModified) {
          const ghTimeStr = ghLastModified.toLocaleString('ja-JP');
          const drTimeStr = driveLastModified.toLocaleString('ja-JP');
          if (!confirm(
            'Drive の方が新しいです。上書きしますか？\n\n' +
            'Drive: ' + drTimeStr + '\n' +
            'GitHub: ' + ghTimeStr + '\n\n' +
            '※ GitHub の内容で Drive を上書きします'
          )) {
            showToast('Pull をキャンセルしました', 'info');
            return;
          }
        }

        // 5. Base64 デコードして内容を取得
        const ghContent = decodeURIComponent(escape(atob(ghData.content.replace(/\n/g, ''))));

        // 6. Drive に上書き保存
        const boundary = '----MDViewerBoundary' + Date.now();
        const mimeType = getFileMime(state.currentFile.name);
        const metadata = JSON.stringify({ mimeType: mimeType });
        const uploadBody =
          '--' + boundary + '\r\n' +
          'Content-Type: application/json; charset=UTF-8\r\n\r\n' +
          metadata + '\r\n' +
          '--' + boundary + '\r\n' +
          'Content-Type: ' + mimeType + '; charset=UTF-8\r\n\r\n' +
          ghContent + '\r\n' +
          '--' + boundary + '--';

        const driveRes = await fetch(
          'https://www.googleapis.com/upload/drive/v3/files/' + state.currentFile.id + '?uploadType=multipart',
          {
            method: 'PATCH',
            headers: {
              'Authorization': 'Bearer ' + state.gdriveToken,
              'Content-Type': 'multipart/related; boundary=' + boundary
            },
            body: uploadBody
          }
        );
        if (!driveRes.ok) throw new Error('Drive への保存失敗: ' + driveRes.status);

        // 7. 画面上の内容を更新
        state.currentContent = ghContent;
        if (state.activeTabIndex >= 0 && state.activeTabIndex < state.openTabs.length) {
          state.openTabs[state.activeTabIndex].content = ghContent;
        }
        renderByType(ghContent, getFileType(state.currentFile.name));
        if (state.isEditing) {
          document.getElementById('editor-content').value = ghContent;
        }

        showToast('GitHub から Pull しました: ' + filePath, 'success');
      } catch (err) {
        showToast('Pull 失敗: ' + err.message, 'error');
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="8 17 12 21 16 17"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.88 18.09A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.29"/></svg>Pull';
      }
    }

    // ============================================================
    // GitHub から Pull（リポジトリ単位）
    // マッピングされた全リポジトリの全ファイルを比較して新しい方で同期
    // ============================================================
    // Drive にフォルダを作成するヘルパー（親フォルダID指定）
    async function createDriveFolder(name, parentId) {
      const res = await fetch(
        'https://www.googleapis.com/drive/v3/files',
        {
          method: 'POST',
          headers: {
            'Authorization': 'Bearer ' + state.gdriveToken,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            name: name,
            mimeType: 'application/vnd.google-apps.folder',
            parents: parentId ? [parentId] : []
          })
        }
      );
      if (!res.ok) throw new Error('フォルダ作成エラー: ' + res.status);
      return await res.json();
    }

    // Drive にフォルダパスを再帰的に作成し、最終フォルダのIDを返す
    // folderMap: Map<id, {name, parentId}> — 既存の Drive フォルダ一覧
    // createdCache: Map<"parentId/name", id> — 今回作成済みのキャッシュ
    async function ensureDriveFolderPath(pathParts, rootId, folderMap, createdCache) {
      let currentParentId = rootId || null;
      for (const part of pathParts) {
        const cacheKey = (currentParentId || 'root') + '/' + part;
        if (createdCache.has(cacheKey)) {
          currentParentId = createdCache.get(cacheKey);
          continue;
        }
        // 既存フォルダを探す
        let found = null;
        for (const [fId, fData] of folderMap) {
          if (fData.name === part && fData.parentId === currentParentId) {
            found = fId;
            break;
          }
        }
        if (found) {
          currentParentId = found;
          createdCache.set(cacheKey, found);
        } else {
          // 新規作成
          const created = await createDriveFolder(part, currentParentId);
          folderMap.set(created.id, { name: part, parentId: currentParentId });
          createdCache.set(cacheKey, created.id);
          currentParentId = created.id;
        }
      }
      return currentParentId;
    }

    async function pullAllFromGitHub() {
      if (!state.githubToken || Object.keys(state.repoMappings).length === 0) {
        showToast('GitHub が未接続です', 'error');
        return;
      }
      if (!state.gdriveToken) {
        showToast('Google Drive に再接続してください', 'error');
        return;
      }

      if (!confirm('GitHub から全ファイルを Pull します。\n・Drive に無いファイルは新規作成されます\n・既存ファイルは GitHub が新しい場合のみ上書きします\n・Drive の方が新しいファイルはスキップします\n\n続行しますか？')) {
        return;
      }

      showToast('リポジトリ Pull を開始します...', 'info');
      let updated = 0;
      let created = 0;
      let skipped = 0;
      let errors = 0;

      // Drive の全フォルダ一覧を取得（フォルダ作成の重複チェック用）
      let folderMap = new Map();
      try {
        const allFolders = await driveListAll(
          "mimeType='application/vnd.google-apps.folder' and trashed=false",
          'id,name,parents'
        );
        for (const f of allFolders) {
          folderMap.set(f.id, { name: f.name, parentId: (f.parents && f.parents[0]) || null });
        }
      } catch (e) {
        showToast('Drive フォルダ取得に失敗: ' + e.message, 'error');
        return;
      }

      // マッピングのトップレベルフォルダIDを特定
      const rootId = state.gdriveFolderId || null;
      const mappingFolderIds = {};
      for (const folderName of Object.keys(state.repoMappings)) {
        for (const [fId, fData] of folderMap) {
          if (fData.name === folderName && (!rootId || fData.parentId === rootId)) {
            mappingFolderIds[folderName] = fId;
            break;
          }
        }
      }

      // 今回の実行で作成したフォルダのキャッシュ
      const createdFolderCache = new Map();

      for (const [folder, repo] of Object.entries(state.repoMappings)) {
        try {
          // マッピング先のトップフォルダが無ければ作成
          if (!mappingFolderIds[folder]) {
            const topFolder = await createDriveFolder(folder, rootId);
            folderMap.set(topFolder.id, { name: folder, parentId: rootId });
            mappingFolderIds[folder] = topFolder.id;
          }
          const topFolderId = mappingFolderIds[folder];

          // リポジトリのファイルツリーを取得
          const treeRes = await fetch(
            'https://api.github.com/repos/' + repo + '/git/trees/' + state.githubBranch + '?recursive=1',
            { headers: { Authorization: 'token ' + state.githubToken, Accept: 'application/vnd.github.v3+json' } }
          );
          if (!treeRes.ok) { errors++; continue; }
          const treeData = await treeRes.json();

          // 対象ファイル（md, csv, txt, py, ipynb）
          const targetFiles = (treeData.tree || []).filter(f =>
            f.type === 'blob' && (f.path.endsWith('.md') || f.path.endsWith('.csv') || f.path.endsWith('.txt') || f.path.endsWith('.py') || f.path.endsWith('.ipynb'))
          );

          for (const ghFile of targetFiles) {
            try {
              // Drive側で対応ファイルを探す（NFC正規化して比較。macOS NFD ≠ GitHub NFC 対策）
              const drivePath = (folder + '/' + ghFile.path).normalize('NFC');
              const driveFile = state.files.find(f => (f.drivePath || '').normalize('NFC') === drivePath);

              if (driveFile) {
                // ── 既存ファイル: タイムスタンプ比較でコンフリクト回避 ──
                let ghTime = null;
                try {
                  const cRes = await fetch(
                    'https://api.github.com/repos/' + repo + '/commits?path=' + encodeURIComponent(ghFile.path) + '&sha=' + state.githubBranch + '&per_page=1',
                    { headers: { Authorization: 'token ' + state.githubToken, Accept: 'application/vnd.github.v3+json' } }
                  );
                  if (cRes.ok) {
                    const commits = await cRes.json();
                    if (commits.length > 0) ghTime = new Date(commits[0].commit.committer.date);
                  }
                } catch (e) {}

                let driveTime = null;
                try {
                  const mRes = await fetch(
                    'https://www.googleapis.com/drive/v3/files/' + driveFile.id + '?fields=modifiedTime',
                    { headers: { Authorization: 'Bearer ' + state.gdriveToken } }
                  );
                  if (mRes.ok) {
                    const meta = await mRes.json();
                    driveTime = new Date(meta.modifiedTime);
                  }
                } catch (e) {}

                // Drive の方が新しければスキップ（コンフリクト回避）
                if (ghTime && driveTime && driveTime >= ghTime) {
                  skipped++;
                  continue;
                }

                // GitHub の内容を取得して Drive に上書き
                const contentRes = await fetch(
                  'https://api.github.com/repos/' + repo + '/contents/' + encodeURIComponent(ghFile.path).replace(/%2F/g, '/') + '?ref=' + state.githubBranch,
                  { headers: { Authorization: 'token ' + state.githubToken, Accept: 'application/vnd.github.v3+json' } }
                );
                if (!contentRes.ok) { errors++; continue; }
                const contentData = await contentRes.json();
                const content = decodeURIComponent(escape(atob(contentData.content.replace(/\n/g, ''))));

                const boundary = '----MDViewerBoundary' + Date.now();
                const mimeType = getFileMime(ghFile.path);
                const metadata = JSON.stringify({ mimeType: mimeType });
                const body =
                  '--' + boundary + '\r\n' +
                  'Content-Type: application/json; charset=UTF-8\r\n\r\n' +
                  metadata + '\r\n' +
                  '--' + boundary + '\r\n' +
                  'Content-Type: ' + mimeType + '; charset=UTF-8\r\n\r\n' +
                  content + '\r\n' +
                  '--' + boundary + '--';

                const upRes = await fetch(
                  'https://www.googleapis.com/upload/drive/v3/files/' + driveFile.id + '?uploadType=multipart',
                  {
                    method: 'PATCH',
                    headers: {
                      'Authorization': 'Bearer ' + state.gdriveToken,
                      'Content-Type': 'multipart/related; boundary=' + boundary
                    },
                    body: body
                  }
                );
                if (upRes.ok) updated++;
                else errors++;

              } else {
                // ── 新規ファイル: Drive にフォルダ階層を作成してファイルを新規作成 ──
                const pathSegments = ghFile.path.split('/');
                const fileName = pathSegments.pop();
                // フォルダ階層を確保（サブフォルダがある場合）
                let parentFolderId = topFolderId;
                if (pathSegments.length > 0) {
                  parentFolderId = await ensureDriveFolderPath(pathSegments, topFolderId, folderMap, createdFolderCache);
                }

                // GitHub の内容を取得
                const contentRes = await fetch(
                  'https://api.github.com/repos/' + repo + '/contents/' + encodeURIComponent(ghFile.path).replace(/%2F/g, '/') + '?ref=' + state.githubBranch,
                  { headers: { Authorization: 'token ' + state.githubToken, Accept: 'application/vnd.github.v3+json' } }
                );
                if (!contentRes.ok) { errors++; continue; }
                const contentData = await contentRes.json();
                const content = decodeURIComponent(escape(atob(contentData.content.replace(/\n/g, ''))));

                // Drive に新規作成
                const boundary = '----MDViewerBoundary' + Date.now();
                const mimeType = getFileMime(fileName);
                const metadata = JSON.stringify({
                  name: fileName,
                  mimeType: mimeType,
                  parents: [parentFolderId]
                });
                const body =
                  '--' + boundary + '\r\n' +
                  'Content-Type: application/json; charset=UTF-8\r\n\r\n' +
                  metadata + '\r\n' +
                  '--' + boundary + '\r\n' +
                  'Content-Type: ' + mimeType + '; charset=UTF-8\r\n\r\n' +
                  content + '\r\n' +
                  '--' + boundary + '--';

                const upRes = await fetch(
                  'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',
                  {
                    method: 'POST',
                    headers: {
                      'Authorization': 'Bearer ' + state.gdriveToken,
                      'Content-Type': 'multipart/related; boundary=' + boundary
                    },
                    body: body
                  }
                );
                if (upRes.ok) created++;
                else errors++;
              }
            } catch (e) { errors++; }
          }
        } catch (e) { errors++; }
      }

      var msg = 'Pull 完了: ';
      if (created > 0) msg += created + '件新規作成 / ';
      msg += updated + '件更新 / ' + skipped + '件スキップ';
      if (errors > 0) msg += ' / ' + errors + '件エラー';
      showToast(msg, (updated > 0 || created > 0) ? 'success' : 'info');
      // ファイル一覧を再取得
      if (updated > 0 || created > 0) refreshFiles();
    }

    // ============================================================
    // ファイル一覧の描画
    // ============================================================
    // ============================================================
    // フォルダナビゲーション: パンくずリスト描画
    // ============================================================
    function renderBreadcrumb() {
      const bc = document.getElementById('breadcrumb');
      if (!state.currentPath) {
        // ルート → パンくず非表示
        bc.style.display = 'none';
        return;
      }
      bc.style.display = 'flex';
      const parts = state.currentPath.split('/').filter(Boolean);
      let html = '<span class="breadcrumb-item" onclick="navigateToPath(\'\')">' + escapeHtml('ルート') + '</span>';
      let accumulated = '';
      for (let i = 0; i < parts.length; i++) {
        accumulated += (accumulated ? '/' : '') + parts[i];
        html += '<span class="breadcrumb-sep"> / </span>';
        if (i === parts.length - 1) {
          // 最後の要素はリンクではなくテキスト
          html += '<span class="breadcrumb-current">' + escapeHtml(parts[i]) + '</span>';
        } else {
          const path = accumulated;
          html += '<span class="breadcrumb-item" onclick="navigateToPath(\'' + escapeHtml(path) + '\')">' + escapeHtml(parts[i]) + '</span>';
        }
      }
      bc.innerHTML = html;
    }

    // フォルダに移動
    function navigateToPath(path) {
      state.currentPath = path;
      renderBreadcrumb();
      renderFileList();
    }

    // ============================================================
    // ファイル一覧の描画（フォルダナビゲーション対応）
    // currentPath の階層にあるフォルダとファイルだけを表示
    // ============================================================
    function renderFileList(filter = '') {
      const container = document.getElementById('file-list');
      let files = state.files;

      // 検索モード: フィルタ指定時はフラット表示（全ファイルから検索）
      if (filter) {
        const lower = filter.toLowerCase();
        files = files.filter(f => (f.drivePath || f.path || f.name).toLowerCase().includes(lower));
        // 検索時はパンくず非表示
        document.getElementById('breadcrumb').style.display = 'none';

        if (files.length === 0) {
          container.innerHTML = '<div class="empty-state"><div class="icon">🔍</div><p>該当するファイルがありません</p></div>';
          return;
        }
        // 検索結果はフラット表示（パス付き）
        container.innerHTML = files.map((f, i) => {
          const idx = state.files.indexOf(f);
          const displayName = f.drivePath || f.path || f.name;
          const pathParts = displayName.split('/');
          const fileName = pathParts.pop();
          const folderPath = pathParts.length > 0 ? pathParts.join('/') + '/' : '';
          const date = f.modifiedTime ? new Date(f.modifiedTime).toLocaleDateString('ja-JP') : '';
          const _ic = getFileIcon(f.name);
          const iconClass = _ic.cls;
          const iconLabel = _ic.label;
          return '<div class="file-item" onclick="openFile(' + idx + ')">' +
            '<div class="file-icon ' + iconClass + '">' + iconLabel + '</div>' +
            '<div class="file-info">' +
            '<div class="file-name">' + escapeHtml(fileName) + '</div>' +
            '<div class="file-meta">' + (folderPath ? escapeHtml(folderPath) + ' ・ ' : '') + date + '</div>' +
            '</div>' +
            '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--text-muted);flex-shrink:0;opacity:0.5;"><path d="m9 18 6-6-6-6"/></svg>' +
            '</div>';
        }).join('');
        return;
      }

      // パンくず表示
      renderBreadcrumb();

      if (files.length === 0) {
        container.innerHTML = '<div class="empty-state"><div class="icon">📄</div><p>' +
          (!state.gdriveToken
            ? '設定画面から GitHub → Google Drive の順に接続してください'
            : Object.keys(state.repoMappings).length === 0
              ? '先に設定画面で GitHub リポジトリのマッピングを設定してください'
              : '.md / .csv ファイルが見つかりません') +
          '</p></div>';
        return;
      }

      // 現在のパスに属するアイテムを抽出
      const prefix = state.currentPath ? state.currentPath + '/' : '';
      const foldersSet = new Set();   // この階層のサブフォルダ名
      const currentFiles = [];         // この階層のファイル

      for (const f of files) {
        const dp = f.drivePath || f.path || f.name;
        if (!dp.startsWith(prefix)) continue; // 別のパスのファイルは無視

        const rest = dp.substring(prefix.length);
        const slashIdx = rest.indexOf('/');

        if (slashIdx === -1) {
          // この階層のファイル
          currentFiles.push(f);
        } else {
          // サブフォルダ
          foldersSet.add(rest.substring(0, slashIdx));
        }
      }

      // フォルダを名前順ソート
      const folders = Array.from(foldersSet).sort((a, b) => a.localeCompare(b, 'ja'));

      if (folders.length === 0 && currentFiles.length === 0) {
        container.innerHTML = '<div class="empty-state"><div class="icon">📂</div><p>このフォルダは空です</p></div>';
        return;
      }

      let html = '';

      // サブフォルダ一覧
      for (const folder of folders) {
        const folderPath = prefix + folder;
        // このフォルダ配下のファイル数をカウント
        const count = files.filter(f => (f.drivePath || f.path || f.name).startsWith(folderPath + '/')).length;
        html += '<div class="folder-item" onclick="navigateToPath(\'' + escapeHtml(folderPath) + '\')">' +
          '<div class="folder-icon">📁</div>' +
          '<div class="folder-name">' + escapeHtml(folder) + '</div>' +
          '<span class="folder-count">' + count + ' 件</span>' +
          '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--text-muted);flex-shrink:0;"><path d="m9 18 6-6-6-6"/></svg>' +
          '</div>';
      }

      // ファイル一覧（この階層のファイル）
      for (const f of currentFiles) {
        const idx = state.files.indexOf(f);
        const date = f.modifiedTime ? new Date(f.modifiedTime).toLocaleDateString('ja-JP') : '';
        const _ic2 = getFileIcon(f.name);
        const iconCls = _ic2.cls;
        const iconLbl = _ic2.label;
        html += '<div class="file-item" onclick="openFile(' + idx + ')">' +
          '<div class="file-icon ' + iconCls + '">' + iconLbl + '</div>' +
          '<div class="file-info">' +
          '<div class="file-name">' + escapeHtml(f.name) + '</div>' +
          '<div class="file-meta">Google Drive' + (date ? ' ・ ' + date : '') + '</div>' +
          '</div>' +
          '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--text-muted);flex-shrink:0;opacity:0.5;"><path d="m9 18 6-6-6-6"/></svg>' +
          '</div>';
      }

      container.innerHTML = html;
    }

    function filterFiles(query) {
      if (!query) {
        // 検索クリア → フォルダナビゲーションに戻る
        renderBreadcrumb();
      }
      renderFileList(query);
    }

    // ============================================================
    // タブ管理
    // ============================================================
    function renderFileTabs() {
      const container = document.getElementById('file-tabs');
      if (state.openTabs.length === 0) {
        container.style.display = 'none';
        return;
      }
      container.style.display = 'flex';
      container.innerHTML = state.openTabs.map((tab, i) => {
        const typeClass = getFileType(tab.file.name);
        const _tabIc = getFileIcon(tab.file.name);
        const typeLabel = _tabIc.label;
        const activeClass = i === state.activeTabIndex ? ' active' : '';
        return '<div class="file-tab' + activeClass + '" onclick="switchToTab(' + i + ')">' +
          '<span class="file-tab-type ' + typeClass + '">' + typeLabel + '</span>' +
          '<span class="file-tab-label">' + escapeHtml(tab.file.name) + '</span>' +
          '<span class="file-tab-close" onclick="event.stopPropagation(); closeTab(' + i + ')">×</span>' +
          '</div>';
      }).join('');
    }

    // 現在のタブの編集状態を保存
    function saveCurrentTabState() {
      if (state.activeTabIndex < 0 || state.activeTabIndex >= state.openTabs.length) return;
      const tab = state.openTabs[state.activeTabIndex];
      tab.isEditing = state.isEditing;
      if (state.isEditing) {
        tab.content = document.getElementById('editor-content').value;
      }
      // 表示中のHTMLも保存（切り替え時の再レンダリングを回避）
      if (getFileType(tab.file.name) !== 'pdf') {
        tab.renderedHtml = document.getElementById('viewer-content').innerHTML;
      }
    }

    // タブの内容を画面に反映
    function restoreTabState(tab) {
      const viewer = document.getElementById('viewer-content');
      const editor = document.getElementById('editor-content');
      const editTabs = document.getElementById('edit-tabs');

      state.currentFile = tab.file;
      state.currentContent = tab.content || '';
      state.isEditing = tab.isEditing || false;

      document.getElementById('viewer-title').textContent = tab.file.name;

      var ft = getFileType(tab.file.name);
      if (ft === 'pdf') {
        // PDF — Canvas は innerHTML で復元できないので、pdfData から再描画する
        document.getElementById('btn-edit').style.display = 'none';
        document.getElementById('btn-save-drive').style.display = 'none';
        editTabs.style.display = 'none';
        editor.style.display = 'none';
        viewer.style.display = 'block';
        if (tab.pdfData) {
          renderPdf(tab.pdfData);
        } else {
          viewer.innerHTML = '<div class="loading"><div class="spinner"></div>読み込み中...</div>';
        }
      } else {
        // テキスト系ファイル (md/csv/txt/py/ipynb)
        var editLabel = ft === 'csv' ? 'ソース' : '編集';
        var viewLabel = ft === 'csv' ? 'テーブル' : '閲覧';
        document.getElementById('btn-edit').style.display = '';
        document.getElementById('btn-save-drive').style.display = '';
        if (state.isEditing) {
          editor.value = tab.content || '';
          editTabs.style.display = 'flex';
          editor.style.display = 'block';
          viewer.style.display = 'none';
          document.getElementById('btn-edit').innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>' + viewLabel;
        } else {
          editTabs.style.display = 'none';
          editor.style.display = 'none';
          viewer.style.display = 'block';
          document.getElementById('btn-edit').innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>' + editLabel;
          if (tab.renderedHtml && ft !== 'csv') {
            viewer.innerHTML = tab.renderedHtml;
          } else {
            renderByType(tab.content || '', ft);
          }
        }
      }
    }

    function switchToTab(index) {
      if (index === state.activeTabIndex) return;
      saveCurrentTabState();
      state.activeTabIndex = index;
      restoreTabState(state.openTabs[index]);
      renderFileTabs();
    }

    function closeTab(index) {
      saveCurrentTabState();
      state.openTabs.splice(index, 1);

      if (state.openTabs.length === 0) {
        // タブが全部閉じた → ファイル一覧に戻る
        state.activeTabIndex = -1;
        state.currentFile = null;
        state.currentContent = '';
        showPage('files');
        renderFileTabs();
        return;
      }

      // アクティブタブの調整
      if (index === state.activeTabIndex) {
        // 閉じたのがアクティブ → 前のタブか最後のタブに切り替え
        state.activeTabIndex = Math.min(index, state.openTabs.length - 1);
        restoreTabState(state.openTabs[state.activeTabIndex]);
      } else if (index < state.activeTabIndex) {
        state.activeTabIndex--;
      }
      renderFileTabs();
    }

    // ============================================================
    // ファイルを開く（タブ対応版）
    // ============================================================
    async function openFile(index) {
      const file = state.files[index];
      if (!file) return;

      // 既に開いてるタブがあればそこに切り替え
      const existingIdx = state.openTabs.findIndex(t => t.file.id === file.id);
      if (existingIdx >= 0) {
        saveCurrentTabState();
        state.activeTabIndex = existingIdx;
        restoreTabState(state.openTabs[existingIdx]);
        renderFileTabs();
        showPage('viewer');
        return;
      }

      // 新しいタブを作成
      saveCurrentTabState();
      const newTab = { file, content: '', renderedHtml: null, pdfData: null, isEditing: false };
      state.openTabs.push(newTab);
      state.activeTabIndex = state.openTabs.length - 1;

      state.currentFile = file;
      state.isEditing = false;
      document.getElementById('viewer-title').textContent = file.name;
      document.getElementById('viewer-content').innerHTML = '<div class="loading"><div class="spinner"></div>読み込み中...</div>';
      document.getElementById('edit-tabs').style.display = 'none';
      document.getElementById('editor-content').style.display = 'none';
      document.getElementById('viewer-content').style.display = 'block';
      showPage('viewer');
      renderFileTabs();

      try {
        if (!state.gdriveToken) {
          throw new Error('Google Drive に再接続してください（設定画面へ）');
        }

        // PDF ファイル
        if (getFileType(file.name) === 'pdf') {
          document.getElementById('btn-edit').style.display = 'none';
          document.getElementById('btn-save-drive').style.display = 'none';
          let pdfData;
          if (gapiReady && gapi.client) {
            gapi.client.setToken({ access_token: state.gdriveToken });
            const response = await gapi.client.request({
              path: '/drive/v3/files/' + file.id,
              params: { alt: 'media' }
            });
            const bytes = new Uint8Array(response.body.length);
            for (let i = 0; i < response.body.length; i++) {
              bytes[i] = response.body.charCodeAt(i) & 0xff;
            }
            pdfData = bytes.buffer;
          } else {
            const res = await fetch(
              'https://www.googleapis.com/drive/v3/files/' + file.id + '?alt=media',
              { headers: { Authorization: 'Bearer ' + state.gdriveToken } }
            );
            if (!res.ok) throw new Error('PDF 読み込みエラー: ' + res.status);
            pdfData = await res.arrayBuffer();
          }
          await renderPdf(pdfData);
          // PDF バイナリデータをタブに保存（タブ切替時の再描画に使う）
          newTab.pdfData = pdfData;
          return;
        }

        // テキスト系ファイル（md / csv / txt / py / ipynb）
        var ft = getFileType(file.name);
        var editLabel = ft === 'csv' ? 'ソース' : '編集';
        document.getElementById('btn-edit').style.display = '';
        document.getElementById('btn-edit').innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>' + editLabel;
        document.getElementById('btn-save-drive').style.display = '';
        const content = await loadGdriveFileContent(file.id);
        state.currentContent = content;
        newTab.content = content;
        renderByType(content, ft);
        newTab.renderedHtml = document.getElementById('viewer-content').innerHTML;
      } catch (err) {
        document.getElementById('viewer-content').innerHTML =
          '<div class="empty-state"><div class="icon">⚠️</div><p>読み込みエラー: ' + escapeHtml(err.message) + '</p></div>';
      }
    }

    // ============================================================
    // PDF 描画（pdf.js を使用）
    // ============================================================
    async function renderPdf(arrayBuffer) {
      const viewer = document.getElementById('viewer-content');
      viewer.innerHTML = '<div class="loading"><div class="spinner"></div>PDF を描画中...</div>';

      try {
        // pdf.js の読み込み完了を待つ
        await window.pdfjsReady;
        const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
        const totalPages = pdf.numPages;

        viewer.innerHTML = '<div class="pdf-viewer"></div>';
        const container = viewer.querySelector('.pdf-viewer');

        // 全ページを順に描画
        for (let i = 1; i <= totalPages; i++) {
          const page = await pdf.getPage(i);
          // スマホ画面幅に合わせてスケール計算
          const containerWidth = container.clientWidth || 360;
          const originalViewport = page.getViewport({ scale: 1 });
          const scale = containerWidth / originalViewport.width;
          const viewport = page.getViewport({ scale: scale });

          const label = document.createElement('div');
          label.className = 'pdf-page-label';
          label.textContent = `${i} / ${totalPages} ページ`;
          container.appendChild(label);

          const canvas = document.createElement('canvas');
          canvas.width = viewport.width;
          canvas.height = viewport.height;
          container.appendChild(canvas);

          await page.render({
            canvasContext: canvas.getContext('2d'),
            viewport: viewport
          }).promise;
        }
      } catch (err) {
        viewer.innerHTML = '<div class="empty-state"><div class="icon">⚠️</div><p>PDF 表示エラー: ' + escapeHtml(err.message) + '</p></div>';
      }
    }

    // ============================================================
    // ファイルタイプ別レンダリング振り分け
    // ============================================================
    function renderByType(content, ft) {
      if (ft === 'csv') return renderCsv(content);
      if (ft === 'ipynb') return renderNotebook(content);
      if (ft === 'py') return renderCode(content, 'python');
      if (ft === 'txt') return renderPlainText(content);
      return renderMarkdown(content); // md がデフォルト
    }

    // プレーンテキスト表示
    function renderPlainText(text) {
      var viewer = document.getElementById('viewer-content');
      viewer.innerHTML = '<div style="padding:16px"><pre style="white-space:pre-wrap;word-break:break-word;font-size:14px;line-height:1.6;color:var(--text)">' + escapeHtml(text) + '</pre></div>';
    }

    // ハイライト済みHTMLに行番号をつけてテーブル形式で返す共通関数
    function buildCodeHtml(source, lang) {
      var highlighted;
      try {
        highlighted = hljs.highlight(source, { language: lang }).value;
      } catch(e) {
        highlighted = escapeHtml(source);
      }
      // 行分割して行番号を生成
      var lines = source.split('\n');
      var numHtml = '';
      for (var i = 1; i <= lines.length; i++) {
        numHtml += '<div>' + i + '</div>';
      }
      return '<pre class="hljs"><table class="code-table"><tr>' +
        '<td class="code-line-nums">' + numHtml + '</td>' +
        '<td class="code-body"><code class="hljs language-' + lang + '">' + highlighted + '</code></td>' +
        '</tr></table></pre>';
    }

    // コード表示（シンタックスハイライト＋行番号）
    function renderCode(code, lang) {
      var viewer = document.getElementById('viewer-content');
      viewer.innerHTML = '<div class="code-viewer">' + buildCodeHtml(code, lang) + '</div>';
    }

    // Jupyter Notebook 表示
    function renderNotebook(jsonText) {
      var viewer = document.getElementById('viewer-content');
      try {
        var nb = JSON.parse(jsonText);
        var cells = nb.cells || [];
        if (cells.length === 0) {
          viewer.innerHTML = '<div class="empty-state"><div class="icon">📓</div><p>ノートブックが空です</p></div>';
          return;
        }

        var html = '';
        for (var i = 0; i < cells.length; i++) {
          var cell = cells[i];
          var type = cell.cell_type || 'code';
          var source = Array.isArray(cell.source) ? cell.source.join('') : (cell.source || '');

          html += '<div class="nb-cell ' + type + '">';
          html += '<div class="nb-cell-header">[' + (i + 1) + '] ' + (type === 'code' ? 'Code' : type === 'markdown' ? 'Markdown' : type) + '</div>';
          html += '<div class="nb-cell-body">';

          if (type === 'markdown') {
            // Markdown セル → HTMLに変換
            try {
              html += marked.parse(source);
            } catch(e) {
              html += '<pre>' + escapeHtml(source) + '</pre>';
            }
          } else if (type === 'code') {
            // コードセル → シンタックスハイライト＋行番号
            var lang = (nb.metadata && nb.metadata.kernelspec && nb.metadata.kernelspec.language) || 'python';
            html += buildCodeHtml(source, lang);
          } else {
            html += '<pre>' + escapeHtml(source) + '</pre>';
          }
          html += '</div>';

          // 出力セル
          var outputs = cell.outputs || [];
          for (var j = 0; j < outputs.length; j++) {
            var out = outputs[j];
            html += '<div class="nb-output">';
            if (out.output_type === 'stream') {
              var text = Array.isArray(out.text) ? out.text.join('') : (out.text || '');
              html += '<pre>' + escapeHtml(text) + '</pre>';
            } else if (out.output_type === 'execute_result' || out.output_type === 'display_data') {
              var data = out.data || {};
              if (data['image/png']) {
                html += '<img src="data:image/png;base64,' + data['image/png'].replace(/\n/g, '') + '">';
              } else if (data['text/html']) {
                var h = Array.isArray(data['text/html']) ? data['text/html'].join('') : data['text/html'];
                html += h;
              } else if (data['text/plain']) {
                var t = Array.isArray(data['text/plain']) ? data['text/plain'].join('') : data['text/plain'];
                html += '<pre>' + escapeHtml(t) + '</pre>';
              }
            } else if (out.output_type === 'error') {
              var tb = (out.traceback || []).join('\n').replace(/\x1b\[[0-9;]*m/g, '');
              html += '<pre style="color:#f87171">' + escapeHtml(tb) + '</pre>';
            }
            html += '</div>';
          }

          html += '</div>';
        }

        viewer.innerHTML = html;
      } catch (e) {
        viewer.innerHTML = '<div class="empty-state"><div class="icon">⚠️</div><p>Notebook 読み込みエラー: ' + escapeHtml(e.message) + '</p></div>';
      }
    }

    // ============================================================
    // Markdown → HTML 変換 & 描画
    // ============================================================
    function renderMarkdown(md) {
      // marked の設定
      marked.setOptions({
        highlight: function(code, lang) {
          if (lang && hljs.getLanguage(lang)) {
            return hljs.highlight(code, { language: lang }).value;
          }
          return hljs.highlightAuto(code).value;
        },
        breaks: true,
        gfm: true
      });

      // Mermaid ブロックを退避
      let mermaidBlocks = [];
      let processed = md.replace(/```mermaid\n([\s\S]*?)```/g, (match, code) => {
        const idx = mermaidBlocks.length;
        mermaidBlocks.push(code.trim());
        return `<div class="mermaid-container" id="mermaid-block-${idx}"></div>`;
      });

      // KaTeX ブロック数式を退避
      let katexBlocks = [];
      processed = processed.replace(/\$\$([\s\S]*?)\$\$/g, (match, tex) => {
        const idx = katexBlocks.length;
        katexBlocks.push({ tex: tex.trim(), display: true });
        return `<span id="katex-block-${idx}"></span>`;
      });

      // KaTeX インライン数式を退避
      let katexInlines = [];
      processed = processed.replace(/\$([^\$\n]+?)\$/g, (match, tex) => {
        const idx = katexInlines.length;
        katexInlines.push(tex.trim());
        return `<span id="katex-inline-${idx}"></span>`;
      });

      // Markdown → HTML
      let html = marked.parse(processed);

      const viewer = document.getElementById('viewer-content');
      viewer.innerHTML = html;

      // Mermaid 図を描画
      mermaidBlocks.forEach((code, idx) => {
        const el = document.getElementById('mermaid-block-' + idx);
        if (el) {
          try {
            el.innerHTML = '<pre class="mermaid">' + code + '</pre>';
          } catch (e) {
            el.innerHTML = '<pre style="color:var(--danger);">Mermaid エラー: ' + escapeHtml(e.message) + '</pre>';
          }
        }
      });

      // KaTeX ブロック数式を描画
      katexBlocks.forEach((item, idx) => {
        const el = document.getElementById('katex-block-' + idx);
        if (el) {
          try {
            el.innerHTML = katex.renderToString(item.tex, { displayMode: true, throwOnError: false });
          } catch (e) {
            el.textContent = item.tex;
          }
        }
      });

      // KaTeX インライン数式を描画
      katexInlines.forEach((tex, idx) => {
        const el = document.getElementById('katex-inline-' + idx);
        if (el) {
          try {
            el.innerHTML = katex.renderToString(tex, { displayMode: false, throwOnError: false });
          } catch (e) {
            el.textContent = tex;
          }
        }
      });

      // Mermaid を再初期化
      if (mermaidBlocks.length > 0) {
        mermaid.initialize({ startOnLoad: false, theme: 'dark' });
        mermaid.run();
      }
    }

    // ============================================================
    // CSV 遅延パース & レンダリング（大規模ファイル対応）
    // ============================================================
    // 設計思想:
    //   巨大CSV（数万〜数十万行）を開いたとき、全行をパースしない。
    //   ① 高速プリスキャン（行の開始位置だけ記録）
    //   ② 表示に必要な行だけオンデマンドでパース
    //   ③ 編集操作が入ったら初めて全行パース（小さいファイル用）
    // ============================================================

    // --- CSV 状態変数 ---
    let csvRawText = null;       // 元テキスト（遅延パース用に保持）
    let csvRowOffsets = null;    // 各行の開始位置の配列
    let csvTotalRows = 0;       // ヘッダー含む総行数
    let csvColCount = 0;        // 列数（ヘッダー基準）
    let csvHeader = [];          // パース済みヘッダー行
    let csvData = null;          // { rows: [[...], ...] } — 全行パース済みデータ（編集時のみ構築）
    let csvPage = 0;
    let csvPageSize = 1000;
    let csvInitialRows = 10;
    let csvExpanded = false;
    let csvDescribeVisible = false;

    // --- ① 高速プリスキャン: 行の開始位置を特定 ---
    // クオート内の改行は行区切りとして扱わない（RFC 4180 準拠）
    function csvBuildOffsets(text) {
      var offsets = [0];
      var inQ = false;
      for (var i = 0; i < text.length; i++) {
        var c = text.charCodeAt(i);
        if (c === 34) { // "
          if (inQ && i + 1 < text.length && text.charCodeAt(i + 1) === 34) {
            i++; // "" エスケープ
          } else {
            inQ = !inQ;
          }
        } else if (!inQ) {
          if (c === 13) { // \r
            if (i + 1 < text.length && text.charCodeAt(i + 1) === 10) i++; // \r\n
            if (i + 1 < text.length) offsets.push(i + 1);
          } else if (c === 10) { // \n
            if (i + 1 < text.length) offsets.push(i + 1);
          }
        }
      }
      return offsets;
    }

    // --- ② 1行分のテキストをセル配列にパース ---
    function csvParseLine(line) {
      var cells = [];
      var cur = '';
      var inQ = false;
      for (var i = 0; i < line.length; i++) {
        var ch = line[i];
        if (inQ) {
          if (ch === '"') {
            if (i + 1 < line.length && line[i + 1] === '"') { cur += '"'; i++; }
            else inQ = false;
          } else { cur += ch; }
        } else {
          if (ch === '"') inQ = true;
          else if (ch === ',') { cells.push(cur); cur = ''; }
          else cur += ch;
        }
      }
      cells.push(cur);
      return cells;
    }

    // offset index → 行テキスト取得
    function csvGetLine(idx) {
      var start = csvRowOffsets[idx];
      var end = idx + 1 < csvRowOffsets.length ? csvRowOffsets[idx + 1] : csvRawText.length;
      // 末尾の改行を除去
      var line = csvRawText.substring(start, end);
      var last = line.length - 1;
      while (last >= 0 && (line.charCodeAt(last) === 10 || line.charCodeAt(last) === 13)) last--;
      return last < line.length - 1 ? line.substring(0, last + 1) : line;
    }

    // 指定範囲の行をパースして返す（startIdx〜endIdx-1）
    function csvParseRange(startIdx, endIdx) {
      var rows = [];
      var limit = Math.min(endIdx, csvTotalRows);
      for (var i = startIdx; i < limit; i++) {
        var line = csvGetLine(i);
        if (line !== '' || i === 0) {
          var parsed = csvParseLine(line);
          // 列数を揃える
          while (parsed.length < csvColCount) parsed.push('');
          rows.push(parsed);
        }
      }
      return rows;
    }

    // --- ③ 全行パース（編集操作時に呼ぶ） ---
    function csvEnsureFullParse() {
      if (csvData && csvData.rows) return; // 既にパース済み
      if (!csvRawText) return;
      var allRows = csvParseRange(0, csvTotalRows);
      csvData = { rows: allRows };
    }

    // CSV → 文字列（保存用）
    function csvToString(rows) {
      return rows.map(function(row) {
        return row.map(function(cell) {
          if (cell.includes(',') || cell.includes('"') || cell.includes('\n') || cell.includes('\r')) {
            return '"' + cell.replace(/"/g, '""') + '"';
          }
          return cell;
        }).join(',');
      }).join('\n');
    }

    // --- メイン: CSV 読み込み ---
    function renderCsv(text) {
      var viewer = document.getElementById('viewer-content');
      try {
        // テキスト保持 & プリスキャン
        csvRawText = text;
        csvRowOffsets = csvBuildOffsets(text);

        // 末尾の空行を除外
        while (csvRowOffsets.length > 1) {
          var lastLine = csvGetLine(csvRowOffsets.length - 1);
          if (lastLine.trim() === '') csvRowOffsets.pop();
          else break;
        }
        csvTotalRows = csvRowOffsets.length;

        if (csvTotalRows === 0) {
          viewer.innerHTML = '<div class="empty-state"><div class="icon">📊</div><p>CSV が空です</p></div>';
          return;
        }

        // ヘッダー行をパース → 列数確定
        csvHeader = csvParseLine(csvGetLine(0));
        csvColCount = csvHeader.length;

        // 全行パース済みデータはリセット（遅延パースモード）
        csvData = null;
        csvPage = 0;
        csvExpanded = false;
        csvDescribeVisible = false;

        renderCsvPage();
      } catch (e) {
        viewer.innerHTML = '<div class="empty-state"><div class="icon">⚠️</div><p>CSV読み込みエラー: ' + escapeHtml(e.message) + '</p></div>';
      }
    }

    // --- ページ描画（表示分の行だけパース） ---
    function renderCsvPage() {
      if (!csvRawText || !csvRowOffsets) return;
      var viewer = document.getElementById('viewer-content');
      var totalDataRows = csvTotalRows - 1; // ヘッダー除く

      // 表示範囲（オフセットindex: 0=ヘッダー, 1〜=データ行）
      var startIdx, endIdx;
      if (!csvExpanded) {
        startIdx = 1;
        endIdx = Math.min(csvInitialRows + 1, csvTotalRows);
      } else {
        startIdx = csvPage * csvPageSize + 1;
        endIdx = Math.min(startIdx + csvPageSize, csvTotalRows);
      }

      // 表示分だけパース
      var visibleRows = csvParseRange(startIdx, endIdx);

      // ツールバー
      var html = '<div class="csv-toolbar">';
      html += '<button class="btn btn-secondary" onclick="csvAddRow()">+ 行追加</button>';
      html += '<button class="btn btn-secondary" onclick="csvAddCol()">+ 列追加</button>';
      html += '<button class="btn btn-secondary" onclick="csvDeleteRow()">- 行削除</button>';
      html += '<button class="btn btn-secondary" onclick="csvDeleteCol()">- 列削除</button>';
      html += '</div>';

      // 情報バー + describe ボタン
      html += '<div class="csv-info">';
      html += '<span>' + totalDataRows.toLocaleString() + ' 行 × ' + csvColCount + ' 列</span>';
      html += '<span>';
      if (csvExpanded) {
        html += '表示: ' + startIdx.toLocaleString() + '〜' + (endIdx - 1).toLocaleString() + ' 行目 ';
      } else {
        html += 'プレビュー: 先頭 ' + Math.min(csvInitialRows, totalDataRows) + ' 行 ';
      }
      html += '<button class="csv-describe-toggle" onclick="csvToggleDescribe()">describe()</button>';
      html += '</span>';
      html += '</div>';
      html += '<div id="csv-describe-container"></div>';

      // テーブル構築
      html += '<div class="csv-table-wrapper"><table class="csv-table" id="csv-edit-table">';

      // ヘッダー行（常に表示）
      html += '<thead><tr><th class="csv-row-num">#</th>';
      for (var c = 0; c < csvColCount; c++) {
        html += '<th contenteditable="true" class="csv-cell csv-header-cell" data-row="0" data-col="' + c + '">' + escapeHtml(csvHeader[c] || '') + '</th>';
      }
      html += '</tr></thead>';

      // データ行（表示分のみ）
      html += '<tbody>';
      for (var i = 0; i < visibleRows.length; i++) {
        var rowIdx = startIdx + i; // 元データでの行番号（1始まり）
        var row = visibleRows[i];
        html += '<tr><td class="csv-row-num">' + rowIdx + '</td>';
        for (var c2 = 0; c2 < csvColCount; c2++) {
          html += '<td contenteditable="true" class="csv-cell" data-row="' + rowIdx + '" data-col="' + c2 + '">' + escapeHtml(row[c2] || '') + '</td>';
        }
        html += '</tr>';
      }
      html += '</tbody></table></div>';

      // ページネーション
      html += '<div class="csv-pagination">';
      if (!csvExpanded) {
        if (totalDataRows > csvInitialRows) {
          html += '<button class="btn btn-primary" onclick="csvExpandAll()">全 ' + totalDataRows.toLocaleString() + ' 行を表示（1000行ずつ）</button>';
        }
      } else {
        var totalPages = Math.ceil(totalDataRows / csvPageSize);
        html += '<button class="btn btn-secondary" onclick="csvPrevPage()" ' + (csvPage <= 0 ? 'disabled' : '') + '>＜ 前</button>';
        html += '<span class="csv-page-info">' + (csvPage + 1) + ' / ' + totalPages + ' ページ</span>';
        html += '<button class="btn btn-secondary" onclick="csvNextPage()" ' + (endIdx >= csvTotalRows ? 'disabled' : '') + '>次 ＞</button>';
      }
      html += '</div>';

      viewer.innerHTML = html;

      // セル編集イベント（インライン編集 → 全行パース発動）
      viewer.querySelectorAll('.csv-cell').forEach(function(cell) {
        cell.addEventListener('blur', function() {
          var r = parseInt(this.dataset.row);
          var c = parseInt(this.dataset.col);
          // 初回編集時に全行パースを実行
          csvEnsureFullParse();
          if (csvData && csvData.rows[r]) {
            csvData.rows[r][c] = this.textContent;
            state.currentContent = csvToString(csvData.rows);
            csvRawText = state.currentContent; // 遅延パース用テキストも更新
            if (state.activeTabIndex >= 0 && state.activeTabIndex < state.openTabs.length) {
              state.openTabs[state.activeTabIndex].content = state.currentContent;
            }
          }
        });
        cell.addEventListener('keydown', function(e) {
          if (e.key === 'Tab') {
            e.preventDefault();
            var r = parseInt(this.dataset.row);
            var cc = parseInt(this.dataset.col);
            var nextR = r, nextC = cc + (e.shiftKey ? -1 : 1);
            if (nextC >= csvColCount) { nextC = 0; nextR++; }
            if (nextC < 0) { nextC = csvColCount - 1; nextR--; }
            var nextCell = document.querySelector('.csv-cell[data-row="' + nextR + '"][data-col="' + nextC + '"]');
            if (nextCell) nextCell.focus();
          }
        });
      });
    }

    // ページ操作
    function csvExpandAll() {
      csvExpanded = true;
      csvPage = 0;
      renderCsvPage();
    }
    function csvNextPage() {
      var totalDataRows = csvTotalRows - 1;
      var totalPages = Math.ceil(totalDataRows / csvPageSize);
      if (csvPage < totalPages - 1) {
        csvPage++;
        renderCsvPage();
        var table = document.getElementById('csv-edit-table');
        if (table) table.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    }
    function csvPrevPage() {
      if (csvPage > 0) {
        csvPage--;
        renderCsvPage();
        var table = document.getElementById('csv-edit-table');
        if (table) table.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    }

    // === describe() 統計機能（遅延パース対応） ===
    function csvToggleDescribe() {
      csvDescribeVisible = !csvDescribeVisible;
      var container = document.getElementById('csv-describe-container');
      if (!container) return;
      if (!csvDescribeVisible) { container.innerHTML = ''; return; }
      container.innerHTML = '<div class="csv-describe-panel"><p style="color:var(--text-muted);padding:8px">統計を計算中…</p></div>';
      // 非同期で計算（UIブロック回避）
      setTimeout(function() {
        var result = csvComputeDescribe();
        var c2 = document.getElementById('csv-describe-container');
        if (c2) c2.innerHTML = '<div class="csv-describe-panel">' + result + '</div>';
      }, 50);
    }

    function csvComputeDescribe() {
      if (!csvRawText || csvTotalRows < 2) return '<p style="color:var(--text-muted);padding:8px">データなし</p>';

      // 列ごとに統計を直接計算（全行パースを避ける：行を1行ずつ読んで集計）
      var numRows = csvTotalRows - 1;
      var stats = csvHeader.map(function(name) {
        return { name: name, count: numRows, nums: [], nullCount: 0, uniqueSet: new Set(), freq: {} };
      });

      // 1行ずつ読んで各列に振り分ける
      for (var ri = 1; ri < csvTotalRows; ri++) {
        var row = csvParseLine(csvGetLine(ri));
        for (var ci = 0; ci < stats.length; ci++) {
          var val = (ci < row.length ? row[ci] : '').trim();
          var s = stats[ci];
          s.uniqueSet.add(val);
          if (val === '' || val.toLowerCase() === 'nan' || val.toLowerCase() === 'null' || val === 'NA') {
            s.nullCount++;
          } else {
            var n = Number(val.replace(/,/g, ''));
            if (!isNaN(n) && val !== '') s.nums.push(n);
          }
          s.freq[val] = (s.freq[val] || 0) + 1;
        }
      }

      // 統計量を算出
      stats.forEach(function(s) {
        s.nonNull = s.count - s.nullCount;
        s.unique = s.uniqueSet.size;
        s.isNumeric = s.nums.length > s.count * 0.5;
        if (s.isNumeric && s.nums.length > 0) {
          s.nums.sort(function(a, b) { return a - b; });
          var sum = 0; for (var i = 0; i < s.nums.length; i++) sum += s.nums[i];
          s.mean = sum / s.nums.length;
          var ssq = 0; for (var i = 0; i < s.nums.length; i++) ssq += (s.nums[i] - s.mean) * (s.nums[i] - s.mean);
          s.std = Math.sqrt(ssq / s.nums.length);
          s.min = s.nums[0];
          s.q25 = s.nums[Math.floor(s.nums.length * 0.25)];
          s.q50 = s.nums[Math.floor(s.nums.length * 0.5)];
          s.q75 = s.nums[Math.floor(s.nums.length * 0.75)];
          s.max = s.nums[s.nums.length - 1];
        } else {
          var topVal = '', topCount = 0;
          var keys = Object.keys(s.freq);
          for (var i = 0; i < keys.length; i++) {
            if (s.freq[keys[i]] > topCount) { topVal = keys[i]; topCount = s.freq[keys[i]]; }
          }
          s.top = topVal;
          s.topFreq = topCount;
        }
        // メモリ解放
        s.nums = null; s.uniqueSet = null; s.freq = null;
      });

      var numStats = stats.filter(function(s) { return s.isNumeric; });
      var strStats = stats.filter(function(s) { return !s.isNumeric; });

      var fmt = function(v) {
        if (v === undefined || v === null) return '-';
        if (typeof v === 'number') {
          if (Math.abs(v) >= 1000) return v.toLocaleString(undefined, { maximumFractionDigits: 2 });
          if (Math.abs(v) < 0.01 && v !== 0) return v.toExponential(2);
          return Number(v.toFixed(4)).toString();
        }
        return '' + v;
      };

      var html = '';
      if (numStats.length > 0) {
        html += '<div style="margin-bottom:8px;font-size:12px;color:var(--accent);font-weight:600">数値列（' + numStats.length + '列）</div>';
        html += '<table><thead><tr><th>列名</th><th>count</th><th>non-null</th><th>mean</th><th>std</th><th>min</th><th>25%</th><th>50%</th><th>75%</th><th>max</th></tr></thead><tbody>';
        numStats.forEach(function(s) {
          html += '<tr><td style="font-weight:600">' + escapeHtml(s.name) + '</td>';
          html += '<td>' + s.count.toLocaleString() + '</td><td>' + s.nonNull.toLocaleString() + '</td>';
          html += '<td>' + fmt(s.mean) + '</td><td>' + fmt(s.std) + '</td>';
          html += '<td>' + fmt(s.min) + '</td><td>' + fmt(s.q25) + '</td><td>' + fmt(s.q50) + '</td><td>' + fmt(s.q75) + '</td><td>' + fmt(s.max) + '</td></tr>';
        });
        html += '</tbody></table>';
      }
      if (strStats.length > 0) {
        html += '<div style="margin:12px 0 8px;font-size:12px;color:#34d399;font-weight:600">文字列列（' + strStats.length + '列）</div>';
        html += '<table><thead><tr><th>列名</th><th>count</th><th>non-null</th><th>unique</th><th>最頻値</th><th>頻度</th></tr></thead><tbody>';
        strStats.forEach(function(s) {
          html += '<tr><td style="font-weight:600">' + escapeHtml(s.name) + '</td>';
          html += '<td>' + s.count.toLocaleString() + '</td><td>' + s.nonNull.toLocaleString() + '</td>';
          html += '<td>' + s.unique.toLocaleString() + '</td>';
          html += '<td>' + escapeHtml(s.top && s.top.length > 30 ? s.top.substring(0, 30) + '…' : (s.top || '')) + '</td>';
          html += '<td>' + (s.topFreq || 0).toLocaleString() + '</td></tr>';
        });
        html += '</tbody></table>';
      }
      return html;
    }

    // --- 編集系関数（全行パースが必要） ---
    function csvAddRow() {
      csvEnsureFullParse();
      if (!csvData) return;
      csvData.rows.push(new Array(csvColCount).fill(''));
      state.currentContent = csvToString(csvData.rows);
      renderCsv(state.currentContent);
    }
    function csvAddCol() {
      csvEnsureFullParse();
      if (!csvData) return;
      csvData.rows.forEach(function(row) { row.push(''); });
      state.currentContent = csvToString(csvData.rows);
      renderCsv(state.currentContent);
    }
    function csvDeleteRow() {
      csvEnsureFullParse();
      if (!csvData || csvData.rows.length <= 1) {
        showToast('ヘッダー行は削除できません', 'error');
        return;
      }
      csvData.rows.pop();
      state.currentContent = csvToString(csvData.rows);
      renderCsv(state.currentContent);
    }
    function csvDeleteCol() {
      csvEnsureFullParse();
      if (!csvData || csvData.rows[0].length <= 1) {
        showToast('最後の列は削除できません', 'error');
        return;
      }
      csvData.rows.forEach(function(row) { row.pop(); });
      state.currentContent = csvToString(csvData.rows);
      renderCsv(state.currentContent);
    }

    // ============================================================
    // 編集モード切替
    // ============================================================
    function toggleEdit() {
      state.isEditing = !state.isEditing;
      const tabs = document.getElementById('edit-tabs');
      const editor = document.getElementById('editor-content');
      const viewer = document.getElementById('viewer-content');
      const btn = document.getElementById('btn-edit');
      var ft = getFileType(state.currentFile ? state.currentFile.name : '');
      var editLabel = ft === 'csv' ? 'ソース' : '編集';
      var viewLabel = ft === 'csv' ? 'テーブル' : '閲覧';

      if (state.isEditing) {
        editor.value = state.currentContent;
        tabs.style.display = 'flex';
        switchTab('source');
        btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>' + viewLabel;
      } else {
        state.currentContent = editor.value;
        tabs.style.display = 'none';
        editor.style.display = 'none';
        viewer.style.display = 'block';
        renderByType(state.currentContent, ft);
        btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>' + editLabel;
      }
      // タブの状態も同期
      if (state.activeTabIndex >= 0 && state.activeTabIndex < state.openTabs.length) {
        const tab = state.openTabs[state.activeTabIndex];
        tab.isEditing = state.isEditing;
        tab.content = state.currentContent;
        tab.renderedHtml = viewer.innerHTML;
      }
    }

    function switchTab(tab) {
      const editor = document.getElementById('editor-content');
      const viewer = document.getElementById('viewer-content');
      const tabs = document.querySelectorAll('#edit-tabs button');
      if (tab === 'source') {
        editor.style.display = 'block';
        viewer.style.display = 'none';
        tabs[0].classList.remove('active');
        tabs[1].classList.add('active');
      } else {
        state.currentContent = editor.value;
        editor.style.display = 'none';
        viewer.style.display = 'block';
        renderByType(state.currentContent, getFileType(state.currentFile ? state.currentFile.name : ''));
        tabs[0].classList.add('active');
        tabs[1].classList.remove('active');
      }
    }

    // ============================================================
    // 更新
    // ============================================================
    function refreshFiles() {
      state.files = [];
      state.currentPath = '';  // フォルダ位置をルートに戻す
      // 手動リフレッシュ → キャッシュを消して強制再取得
      localStorage.removeItem(FILE_CACHE_KEY);
      document.getElementById('file-list').innerHTML = '<div class="loading"><div class="spinner"></div>更新中...</div>';
      document.getElementById('breadcrumb').style.display = 'none';
      if (state.gdriveToken) {
        // スピナー付きで最新取得
        fetchLatestDriveFiles().then(files => {
          if (files) {
            state.files = files;
            saveFileCache(files);
          }
          renderFileList();
        }).catch(err => {
          showToast('更新失敗: ' + err.message, 'error');
          renderFileList();
        });
      } else {
        renderFileList();
      }
    }

    // ============================================================
    // 設定クリア
    // ============================================================
    function clearAllSettings() {
      Object.assign(state, {
        gdriveToken: null, gdriveClientId: null, gdriveFolderId: null,
        githubToken: null, githubBranch: 'main',
        repoMappings: {}, githubRepos: [],
        files: [], currentFile: null, currentContent: '', isEditing: false,
        openTabs: [], activeTabIndex: -1
      });
      localStorage.removeItem('mdviewer_settings');
      document.querySelectorAll('.settings-section input').forEach(i => i.value = '');
      document.getElementById('gdrive-client-id').value = '975677173358-i3rdoqc0je229uobr9cqq1sb63ett2pp.apps.googleusercontent.com';
      document.getElementById('github-branch').value = 'main';
      document.getElementById('repo-checkbox-list').innerHTML = '';
      document.getElementById('github-repo-section').style.display = 'none';
      updateGdriveStatus(false);
      updateGithubStatus(false);
      renderFileTabs();
      renderFileList();
      showToast('設定をクリアしました', 'info');
    }

    // ============================================================
    // ユーティリティ
    // ============================================================
    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // ファイルタイプ判定ヘルパー（全箇所でこれを使う）
    function getFileType(name) {
      if (!name) return 'md';
      var n = name.toLowerCase();
      if (n.endsWith('.pdf')) return 'pdf';
      if (n.endsWith('.csv')) return 'csv';
      if (n.endsWith('.txt')) return 'txt';
      if (n.endsWith('.py')) return 'py';
      if (n.endsWith('.ipynb')) return 'ipynb';
      return 'md';
    }
    // ファイルタイプ → アイコンCSS / ラベル / MIMEタイプ
    function getFileIcon(name) {
      var t = getFileType(name);
      var map = {
        md: { cls: 'md-icon', label: 'MD' },
        pdf: { cls: 'pdf-icon', label: 'PDF' },
        csv: { cls: 'csv-icon', label: 'CSV' },
        txt: { cls: 'txt-icon', label: 'TXT' },
        py: { cls: 'py-icon', label: 'PY' },
        ipynb: { cls: 'ipynb-icon', label: 'NB' }
      };
      return map[t] || map.md;
    }
    function getFileMime(name) {
      var t = getFileType(name);
      var map = { md: 'text/markdown', csv: 'text/csv', txt: 'text/plain', py: 'text/x-python', ipynb: 'application/json' };
      return map[t] || 'text/plain';
    }

    // ============================================================
    // OAuth コールバック処理（リダイレクト後にトークンを拾う）
    // ============================================================
    (function handleOAuthRedirect() {
      if (window.location.hash.includes('access_token=')) {
        const params = new URLSearchParams(window.location.hash.substring(1));
        state.gdriveToken = params.get('access_token');
        // gapi にもトークンをセット
        if (gapiReady && gapi.client) gapi.client.setToken({ access_token: state.gdriveToken });
        // ハッシュをクリア
        history.replaceState(null, '', window.location.pathname);
        updateGdriveStatus(true);
        saveSettings();
        showToast('Google Drive に接続しました', 'success');
        loadGdriveFiles();
      }
    })();

    // ============================================================
    // Service Worker 登録
    // ============================================================
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js')
        .then(reg => {
          console.log('Service Worker 登録完了');
          // 新しい SW が見つかったら自動で有効化してリロード
          reg.addEventListener('updatefound', () => {
            const newSW = reg.installing;
            if (newSW) {
              newSW.addEventListener('statechange', () => {
                if (newSW.state === 'activated' && navigator.serviceWorker.controller) {
                  showToast('アプリが更新されました。リロードします…', 'success');
                  setTimeout(() => location.reload(), 1000);
                }
              });
            }
          });
          // 起動時に毎回更新チェック
          reg.update();
        })
        .catch(err => console.warn('SW 登録失敗:', err));
    }

    // ============================================================
    // Mermaid 初期化
    // ============================================================
    mermaid.initialize({ startOnLoad: false, theme: 'dark' });

    // 初期表示
    renderFileList();
  </script>
